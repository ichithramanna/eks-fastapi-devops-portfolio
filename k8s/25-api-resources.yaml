apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: order
spec:
  replicas: 2
  selector:                        # Finds existing Pods
    matchLabels:
      app: order-api
  template:                        # New Pod blueprint
    metadata:
      labels:                      # ← FIXED: Matches selector
        app: order-api
    spec:
      containers:
      - name: api
        image: order-api:0.1.0
        ports:
        - containerPort: 80
        env:
        - name: DATABASE_URL
          value: "postgresql+psycopg://app:app_password@db:5432/orders"
        - name: SECRET_KEY
          value: "change_me_later"
        resources:                   # HPA needs this
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
